<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown Reader</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <div id="tabbar"></div>
    <div id="workspace">
      <aside id="sidebar">
        <div id="sidebar-head">
          <button id="pick-folder" type="button" title="选择一个文件夹">📁 选择文件夹</button>
          <button id="sidebar-toggle" type="button" title="折叠/展开侧栏">⟨</button>
        </div>
        <div id="tree"></div>
      </aside>
      <div id="editor"></div>
    </div>
    <div id="statusbar">
      <span id="status-file">未打开文件</span>
      <span id="statusbar-right">
        <span id="status-state"></span>
        <button id="theme-toggle" type="button" title="切换深色/浅色主题">🌙</button>
      </span>
    </div>
  </body>
</html>
