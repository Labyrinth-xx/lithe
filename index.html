<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lithe</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <div id="tabbar"></div>
    <div id="workspace">
      <div id="editor"></div>
      <!-- 阅读模式只读区：Vditor.preview 渲染只读 HTML（无 md 符号、复制即纯文字），
           盖在工具栏下方。显隐由 #workspace.reading-mode 控制，顶部偏移由 reading-mode.ts 运行时设。 -->
      <div id="reader" class="vditor-reset"></div>
    </div>
    <!-- 文件夹浮窗：由顶部文件夹按钮唤出，定位贴在该按钮下方（见 workspace.ts） -->
    <div id="folder-popover" hidden>
      <div id="folder-head">
        <button id="pick-folder" type="button" title="选择一个文件夹">📁 选择文件夹</button>
      </div>
      <div id="tree"></div>
    </div>
    <div id="statusbar">
      <span id="statusbar-left">
        <button id="theme-toggle" type="button" title="切换深色/浅色主题">🌙</button>
        <span id="status-version"></span>
      </span>
      <span id="statusbar-right">
        <span id="status-state"></span>
        <span id="status-wordcount"></span>
      </span>
    </div>
  </body>
</html>
